server {
    listen 80;
    server_name hafizhp.my.id www.hafizhp.my.id;
    return 301 https://hafizhp.my.id$request_uri;
}

server {
    listen 443 ssl;
    server_name hafizhp.my.id www.hafizhp.my.id;

    ssl_certificate     /etc/letsencrypt/live/hafizhp.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hafizhp.my.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
