services:
  portfolio:
    build: .
    image: hafizhp-portfolio:latest
    container_name: hafizhp-portfolio
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/inquiries.db
